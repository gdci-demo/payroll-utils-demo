name: Payroll CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Payroll validation checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run unit tests
        run: pytest -q

      - name: Add Payroll CI summary
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          # Payroll CI summary
          | Item | Result |
          | --- | --- |
          | Repository checkout completed | ✅ |
          | Python environment configured | ✅ |
          | Unit tests executed with pytest | ✅ |
          | Trigger | ${{ github.event_name }} |
          | Branch | ${{ github.ref_name }} |
          | Commit | ${{ github.sha }} |

          ## Business value
          - Automated quality validation on every pull request
          - Repeatable SDLC checks without manual effort
          - Visible evidence for delivery and engineering leadership
          EOF
